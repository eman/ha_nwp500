# Service definitions for Navien NWP500 integration

set_reservation:
  name: Set Reservation
  description: >-
    Create or update a single reservation schedule entry. Reservations allow
    automatic mode and temperature changes at scheduled times. The device
    supports up to 7 reservation entries.
  fields:
    device_id:
      name: Device
      description: The target NWP500 water heater device
      required: true
      selector:
        device:
          integration: nwp500
    entity_id:
      name: Entity
      description: The entity ID of the water heater (alternative to Device ID)
      required: false
      selector:
        entity:
          domain: water_heater
          integration: nwp500
    enabled:
      name: Enabled
      description: Whether this reservation entry is active
      required: true
      default: true
      selector:
        boolean:
    days:
      name: Days
      description: >-
        Days of the week for this reservation. Select one or more days.
      required: true
      selector:
        select:
          multiple: true
          options:
            - label: Sunday
              value: Sunday
            - label: Monday
              value: Monday
            - label: Tuesday
              value: Tuesday
            - label: Wednesday
              value: Wednesday
            - label: Thursday
              value: Thursday
            - label: Friday
              value: Friday
            - label: Saturday
              value: Saturday
    hour:
      name: Hour
      description: Hour of day (0-23) when reservation activates
      required: true
      selector:
        number:
          min: 0
          max: 23
          mode: box
    minute:
      name: Minute
      description: Minute of hour (0-59) when reservation activates
      required: true
      default: 0
      selector:
        number:
          min: 0
          max: 59
          mode: box
    mode:
      name: Operation Mode
      description: DHW operation mode to set when reservation activates
      required: true
      selector:
        select:
          options:
            - label: Heat Pump Only
              value: heat_pump
            - label: Electric Only
              value: electric
            - label: Energy Saver (Hybrid)
              value: energy_saver
            - label: High Demand (Hybrid)
              value: high_demand
            - label: Vacation
              value: vacation
            - label: Power Off
              value: power_off
    temperature:
      name: Temperature
      description: >-
        Target temperature in Fahrenheit (80-150°F). Required for heating modes,
        ignored for vacation and power off modes.
      required: false
      selector:
        number:
          min: 80
          max: 150
          unit_of_measurement: °F
          mode: slider

update_reservations:
  name: Update All Reservations
  description: >-
    Replace all reservation schedules with a new set. This is an advanced service
    that allows setting multiple reservations at once. Use set_reservation for
    simpler single-entry updates.
  fields:
    device_id:
      name: Device
      description: The target NWP500 water heater device
      required: true
      selector:
        device:
          integration: nwp500
    entity_id:
      name: Entity
      description: The entity ID of the water heater (alternative to Device ID)
      required: false
      selector:
        entity:
          domain: water_heater
          integration: nwp500
    reservations:
      name: Reservations
      description: >-
        List of reservation entries. Each entry should be a dictionary with keys:
        enable (1=enabled, 2=disabled), week (day bitfield), hour (0-23),
        min (0-59), mode (1-6), param (temperature in half-degrees Celsius).
        Use the set_reservation service for a simpler interface.
      required: true
      selector:
        object:
    enabled:
      name: System Enabled
      description: Whether the reservation system is enabled overall
      required: false
      default: true
      selector:
        boolean:

clear_reservations:
  name: Clear All Reservations
  description: Remove all reservation schedules from the device
  fields:
    device_id:
      name: Device
      description: The target NWP500 water heater device
      required: true
      selector:
        device:
          integration: nwp500
    entity_id:
      name: Entity
      description: The entity ID of the water heater (alternative to Device ID)
      required: false
      selector:
        entity:
          domain: water_heater
          integration: nwp500

request_reservations:
  name: Request Reservations
  description: >-
    Request the current reservation schedules from the device. The response
    will be stored in the coordinator and fired as a
    nwp500_reservations_updated event.
  fields:
    device_id:
      name: Device
      description: The target NWP500 water heater device
      required: true
      selector:
        device:
          integration: nwp500
    entity_id:
      name: Entity
      description: The entity ID of the water heater (alternative to Device ID)
      required: false
      selector:
        entity:
          domain: water_heater
          integration: nwp500

enable_demand_response:
  name: Enable Demand Response
  description: >-
    Enable participation in utility demand response programs. When enabled,
    the device can respond to utility signals to reduce power consumption
    during peak demand periods.
  fields:
    device_id:
      name: Device
      description: The target NWP500 water heater device
      required: true
      selector:
        device:
          integration: nwp500

disable_demand_response:
  name: Disable Demand Response
  description: Disable utility demand response participation
  fields:
    device_id:
      name: Device
      description: The target NWP500 water heater device
      required: true
      selector:
        device:
          integration: nwp500

reset_air_filter:
  name: Reset Air Filter Timer
  description: >-
    Reset the air filter maintenance timer. Use this after cleaning or
    replacing the air filter to restart the maintenance tracking.
  fields:
    device_id:
      name: Device
      description: The target NWP500 water heater device
      required: true
      selector:
        device:
          integration: nwp500

set_vacation_days:
  name: Set Vacation Days
  description: >-
    Configure vacation mode duration. Sets the device to vacation mode for
    the specified number of days (1-365). Vacation mode reduces energy
    consumption during extended absences.
  fields:
    device_id:
      name: Device
      description: The target NWP500 water heater device
      required: true
      selector:
        device:
          integration: nwp500
    days:
      name: Days
      description: Number of days for vacation mode (1-365)
      required: true
      selector:
        number:
          min: 1
          max: 365
          mode: box

set_recirculation_mode:
  name: Set Recirculation Mode
  description: >-
    Set the recirculation pump operation mode. Controls how the hot water
    recirculation system operates.
  fields:
    device_id:
      name: Device
      description: The target NWP500 water heater device
      required: true
      selector:
        device:
          integration: nwp500
    mode:
      name: Mode
      description: Recirculation mode (1-4)
      required: true
      selector:
        number:
          min: 1
          max: 4
          mode: box

trigger_recirculation:
  name: Trigger Recirculation
  description: >-
    Manually trigger the recirculation pump hot button. Immediately starts
    the recirculation pump to deliver hot water to fixtures.
  fields:
    device_id:
      name: Device
      description: The target NWP500 water heater device
      required: true
      selector:
        device:
          integration: nwp500

configure_tou_schedule:
  name: Configure TOU Schedule
  description: >-
    Configure the Time of Use (TOU) pricing schedule on the device.
    Up to 16 periods can be defined with seasonal, weekly, and
    time-based pricing information. The device uses this to optimize
    heating based on electricity rates.
  fields:
    device_id:
      name: Device
      description: The target NWP500 water heater device
      required: true
      selector:
        device:
          integration: nwp500
    periods:
      name: TOU Periods
      description: >-
        List of TOU period entries (max 16). Each entry is a dictionary with
        keys: season (month bitfield 0-4095), week (day bitfield 0-127),
        start_hour (0-23), start_minute (0-59), end_hour (0-23),
        end_minute (0-59), price_min (encoded price), price_max (encoded price),
        decimal_point (decimal places for price).
      required: true
      selector:
        object:
    enabled:
      name: Enabled
      description: Whether the TOU scheduling system is enabled
      required: false
      default: true
      selector:
        boolean:

request_tou_settings:
  name: Request TOU Settings
  description: >-
    Request the current Time of Use (TOU) schedule configuration from the
    device. The response will be stored in the coordinator and fired as a
    nwp500_tou_updated event.
  fields:
    device_id:
      name: Device
      description: The target NWP500 water heater device
      required: true
      selector:
        device:
          integration: nwp500
