name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract release notes from changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "No changelog header found for version $VERSION in CHANGELOG.md"
            exit 1
          fi

          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { in_section=1; next }
            in_section && $0 ~ "^## \\[" { exit }
            in_section { print }
          ' CHANGELOG.md > /tmp/release-notes.md

          if [ ! -s /tmp/release-notes.md ]; then
            echo "- No changelog details were provided for this release." \
              > /tmp/release-notes.md
          fi

      - name: Create integration archive
        run: |
          cd custom_components
          zip -r ../nwp500-${{ steps.version.outputs.version }}.zip nwp500/

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: /tmp/release-notes.md
          files: nwp500-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
