<svg width="600" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#1a2f42"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#41BDF5"/>
      <stop offset="100%" style="stop-color:#0288d1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="120" fill="url(#bgGrad)" rx="8"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="4" height="120" fill="url(#accentGrad)" rx="2"/>

  <!-- Decorative rings -->
  <circle cx="530" cy="60" r="80" fill="none" stroke="#41BDF5" stroke-width="0.5" opacity="0.07"/>
  <circle cx="530" cy="60" r="55" fill="none" stroke="#41BDF5" stroke-width="0.5" opacity="0.11"/>
  <circle cx="530" cy="60" r="31" fill="none" stroke="#41BDF5" stroke-width="0.75" opacity="0.17"/>

  <!-- Water drop -->
  <path d="M530 39 Q555 54 555 65 A16.5 16.5 0 0 1 513.5 65 Q513.5 54 530 39Z"
        fill="#41BDF5" opacity="0.22"/>

  <!-- Title -->
  <text x="34" y="65" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="36" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Navien NWP500</text>

  <!-- Subtitle -->
  <text x="35" y="85" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="12" font-weight="400" fill="#41BDF5">Home Assistant Integration</text>
</svg>
