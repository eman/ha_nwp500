[tox]
envlist = py314,mypy,basedpyright,ruff,coverage,hacs
skipsdist = True
runner = uv-venv

[testenv]
description = Run unit tests with pytest
deps =
    pytest>=7.0.0
    pytest-asyncio>=0.21.0
    pytest-cov>=4.0.0
    pytest-homeassistant-custom-component>=0.13.323
    pytest-timeout>=2.1.0
commands_pre =
    python -m pip install awsiotsdk>=1.28.2
    python -m pip install nwp500-python==7.4.9 --no-deps

[testenv:py314]
description = Run tests on Python 3.14
basepython = python3.14

[testenv:mypy]
description = Run mypy type checking
deps =
    mypy>=1.0.0
    homeassistant>=2026.4.0
    nwp500-python==7.4.9
commands_pre =

[testenv:basedpyright]
description = Run basedpyright type checking
deps =
    basedpyright>=1.0.0
    homeassistant>=2026.4.0
    nwp500-python==7.4.9
commands_pre =

[testenv:ruff]
description = Run ruff linting and formatting checks
deps =
    ruff>=0.1.0
skip_install = True
commands_pre =
commands =
    ruff check custom_components/nwp500 tests scripts
    ruff format --check custom_components/nwp500 tests scripts

[testenv:coverage]
description = Run tests and generate coverage report
basepython = python3.14
deps =
    {[testenv]deps}
commands =
    pytest --cov=custom_components.nwp500 \
           --cov-report=term-missing \
           --cov-report=html \
           --cov-report=xml \
           --cov-fail-under=80 \
           {posargs:tests/}

[testenv:coverage-html]
description = Generate HTML coverage report
deps =
    {[testenv]deps}
commands_pre =
    python -m pip install awsiotsdk>=1.28.2
    python -m pip install nwp500-python==7.4.9 --no-deps
commands =
    pytest --cov=custom_components.nwp500 \
           --cov-report=html \
           {posargs:tests/}
    python -m webbrowser htmlcov/index.html

[testenv:hacs]
description = Validate HACS requirements
deps =
skip_install = True
commands_pre =
allowlist_externals =
    python
commands =
    python validate_hacs.py
